<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Route Video Generator</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <!-- html2canvas for recording -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            display: flex;
            height: 100vh;
        }

        #map {
            height: 100vh;
            width: 100%;
            flex: 1;
        }

        .control-panel {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 350px;
            max-width: 350px;
            height: 100vh;
            overflow-y: auto;
            order: -1;
        }

        .control-panel h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .status-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .status-message.info {
            background: #e7f3ff;
            color: #0066cc;
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .status-message.warning {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        /* Style selector section */
        .section-divider {
            border-top: 1px solid #ddd;
            margin: 15px 0;
        }

        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .slider-group {
            margin: 15px 0;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .slider-group input[type="range"] {
            width: 100%;
        }

        /* Video controls section */
        .video-controls {
            display: none !important;
        }

        .video-controls.active {
            display: block !important;
        }

        .btn-record {
            background: #dc3545;
        }

        .btn-record:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-success:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-download {
            background: #17a2b8;
        }

        .btn-download:hover {
            background: #138496;
        }

        .btn-download:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .recording-indicator {
            display: none;
            margin-top: 10px;
            padding: 8px;
            background: #ffe6e6;
            color: #cc0000;
            border-radius: 4px;
            font-weight: 600;
            text-align: center;
            font-size: 13px;
        }

        .recording-indicator.active {
            display: block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #007bff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animated polyline styles */
        .animated-polyline {
            stroke-dasharray: 10, 5;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -300;
            }
        }

        .animated-icon {
            font-size: 20px; /* Ukuran emoji */
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 24px;
        }

        /* Icon animation effects */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes spin-continuous {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .icon-animation-sway {
            animation-name: sway;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .icon-animation-spin {
            animation-name: spin-continuous;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        .icon-animation-bounce {
            animation-name: bounce;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        /* Autocomplete suggestions styling */
        .location-input-wrapper {
            position: relative;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1001;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .autocomplete-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: #f5f5f5;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item-main {
            font-weight: 500;
            color: #007bff;
        }

        .suggestion-item-sub {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .suggestion-loading {
            padding: 10px 12px;
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        #recording-area-overlay {
            position: fixed;
            top: 0;
            left: 350px;
            width: calc(100% - 350px);
            height: 100%;
            border: 3px dashed rgba(220, 53, 69, 0.7);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            z-index: 999;
            pointer-events: none;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>
    <div id="map">
        <div id="recording-area-overlay"></div>
    </div>

    <div class="control-panel">
        <h2>Route Generator</h2>
        
        <!-- Input Section -->
        <div class="form-group">
            <label for="startPoint">Titik Awal (Start)</label>
            <div class="location-input-wrapper">
                <input 
                    type="text" 
                    id="startPoint" 
                    placeholder="e.g., -6.2088,106.8456 atau ketik nama kota"
                    autocomplete="off"
                >
                <div class="autocomplete-suggestions" id="startSuggestions"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="endPoint">Titik Tujuan (Destination)</label>
            <div class="location-input-wrapper">
                <input 
                    type="text" 
                    id="endPoint" 
                    placeholder="e.g., -6.1751,106.8291 atau ketik nama kota"
                    autocomplete="off"
                >
                <div class="autocomplete-suggestions" id="endSuggestions"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="generateBtn">Generate Route</button>
            <button class="btn-secondary" id="clearBtn">Clear</button>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <!-- Style Selector -->
        <div class="section-divider"></div>
        <div class="form-group">
            <label for="styleSelector">Map Style</label>
            <select id="styleSelector">
                <option value="cartodb-positron">CartoDB Positron (Default)</option>
                <option value="cartodb-voyager">CartoDB Voyager</option>
                <option value="osm">OpenStreetMap</option>
                <option value="satellite">Satellite</option>
            </select>
        </div>

        <!-- Icon Selector -->
        <div class="section-divider"></div>
        <div class="form-group">
            <label for="iconSelector">Icon untuk Animasi</label>
            <select id="iconSelector">
                <option value="🚗">🚗 Mobil Merah</option>
                <option value="🚕">🚕 Taxi Kuning</option>
                <option value="🚙">🚙 SUV</option>
                <option value="🚌">🚌 Bus</option>
                <option value="🚎">🚎 Bus Hijau</option>
                <option value="🚐">🚐 Minibus</option>
                <option value="🚚">🚚 Truk</option>
                <option value="🚛">🚛 Truk Besar</option>
                <option value="🚜">🚜 Traktor</option>
                <option value="🏎️">🏎️ Race Car</option>
                <option value="🚓">🚓 Polisi</option>
                <option value="🚑">🚑 Ambulans</option>
                <option value="🚒">🚒 Fire Truck</option>
                <option value="🛵">🛵 Motor</option>
                <option value="🏍️">🏍️ Motorcycle</option>
                <option value="🚲">🚲 Sepeda</option>
                <option value="🛴">🛴 Skateboard</option>
                <option value="✈️">✈️ Pesawat</option>
                <option value="🚁">🚁 Helikopter</option>
                <option value="🛸">🛸 UFO</option>
                <option value="🚀">🚀 Rocket</option>
                <option value="⛵">⛵ Perahu</option>
                <option value="🛥️">🛥️ Speedboat</option>
                <option value="🚢">🚢 Kapal</option>
                <option value="🐎">🐎 Kuda</option>
                <option value="🐘">🐘 Gajah</option>
                <option value="🦁">🦁 Singa</option>
                <option value="🐓">🐓 Ayam</option>
                <option value="👤">👤 Manusia</option>
                <option value="🤖">🤖 Robot</option>
            </select>
        </div>

        <!-- Custom Icon Upload -->
        <div class="form-group">
            <label for="customIconUpload">atau Unggah Ikon Kustom (PNG/JPG):</label>
            <input type="file" id="customIconUpload" accept="image/png, image/jpeg">
            <img id="customIconPreview" src="" alt="Custom Icon Preview" style="display: none; max-width: 24px; max-height: 24px; margin-top: 5px;">
        </div>

        <!-- Icon Size Slider -->
        <div class="slider-group">
            <label for="iconSizeSlider">
                Ukuran Ikon
                <span id="iconSizeValue">20px</span>
            </label>
            <input 
                type="range" 
                id="iconSizeSlider" 
                min="16" 
                max="200" 
                step="1" 
                value="20"
            >
        </div>

        <!-- Icon Rotation Slider -->
        <div class="slider-group">
            <label for="iconRotationSlider">
                Rotasi Ikon
                <span id="iconRotationValue">90°</span>
            </label>
            <input 
                type="range" 
                id="iconRotationSlider" 
                min="0" 
                max="360" 
                step="1" 
                value="90"
            >
        </div>

        <!-- Icon Animation Effect -->
        <div class="form-group">
            <label for="iconAnimationEffect">Efek Animasi Ikon</label>
            <select id="iconAnimationEffect" class="styled-select">
                <option value="none">Tidak Ada</option>
                <option value="sway">🌊 Goyang</option>
                <option value="spin">🔄 Berputar</option>
                <option value="bounce">⬆️ Lompat</option>
            </select>
        </div>

        <!-- Icon Animation Speed Slider -->
        <div class="slider-group">
            <label for="iconAnimationSpeedSlider">
                Kecepatan Animasi Ikon
                <span id="iconAnimationSpeedValue">1.0s</span>
            </label>
            <input 
                type="range" 
                id="iconAnimationSpeedSlider" 
                min="0.5" 
                max="3" 
                step="0.1" 
                value="1"
            >
        </div>

        <!-- Animation Speed Slider -->
        <div class="slider-group">
            <label for="speedSlider">
                Animation Speed
                <span id="speedValue">1.0x</span>
            </label>
            <input 
                type="range" 
                id="speedSlider" 
                min="0.1" 
                max="3" 
                step="0.1" 
                value="1"
            >
        </div>

        <!-- Version Number -->
        <div class="section-divider"></div>
        <div id="app-version" style="text-align: center; font-size: 12px; color: #888; margin-top: 15px;"></div>

        <!-- Animation & Video Controls -->
        <h2>Opsi Rekaman</h2>
        <div class="form-group">
            <label for="recordingQuality">Bitrate Video</label>
            <select id="recordingQuality" class="styled-select">
                <option value="20000000">20 Mbps</option>
                <option value="25000000">25 Mbps</option>
                <option value="30000000" selected>30 Mbps</option>
                <option value="35000000">35 Mbps</option>
                <option value="40000000">40 Mbps</option>
                <option value="45000000">45 Mbps</option>
                <option value="50000000">50 Mbps</option>
            </select>
        </div>
        <div class="form-group">
            <label for="recordingFps">Frame Rate:</label>
            <select id="recordingFps" class="styled-select">
                <option value="15">15 FPS</option>
                <option value="30" selected>30 FPS</option>
                <option value="60">60 FPS</option>
            </select>
        </div>
        <div class="form-group">
            <label for="recordingAspectRatio">Aspek Rasio:</label>
            <select id="recordingAspectRatio" class="styled-select">
                <option value="auto" selected>Otomatis (Ukuran Layar)</option>
                <option value="16:9">16:9 (HD Video)</option>
                <option value="1:1">1:1 (Persegi)</option>
            </select>
        </div>

        <div id="videoControls" style="display: none;">
            <div class="button-group">
                <button id="animateBtn">Mulai Animasi</button>
            </div>
            <div class="button-group">
                <button class="btn-record" id="recordBtn">Record Animation</button>
            </div>
            <div class="button-group">
                <button class="btn-download" id="downloadBtn" disabled>Export Video</button>
            </div>
            <div class="recording-indicator" id="recordingIndicator">
                ● Recording...
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- Leaflet AntPath (working CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.1.2/dist/leaflet-ant-path.umd.min.js"></script>

    <!-- Main Application Script (with cache busting) -->
    <script src="app.js?v=20260415_v8"></script>
</body>
</html>
