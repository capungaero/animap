<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Route Video Generator</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <!-- html2canvas for recording -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* ============================================
           CSS VARIABLES FOR THEMING
           ============================================ */
        :root {
            /* Light Mode - Primary Colors */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafb;
            --bg-tertiary: #fafbfc;
            --bg-map: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);

            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-tertiary: #a0aec0;

            --border-color: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --shadow-lg: -4px 0 20px rgba(0, 0, 0, 0.15);

            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-info: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --gradient-background: linear-gradient(180deg, #ffffff 0%, #f8fafb 100%);
        }

        :root.dark-mode {
            /* Dark Mode - Primary Colors */
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #374151;
            --bg-map: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);

            --text-primary: #f7fafc;
            --text-secondary: #cbd5e0;
            --text-tertiary: #718096;

            --border-color: #4a5568;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: -4px 0 20px rgba(0, 0, 0, 0.5);

            /* Gradients stay same but work better in dark */
            --gradient-background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg-map);
            display: flex;
            height: 100vh;
        }

        #map {
            height: 100vh;
            width: 100%;
            flex: 1;
            box-shadow: var(--shadow-lg);
        }

        .control-panel {
            position: relative;
            background: var(--gradient-background);
            padding: 0;
            border-radius: 0;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            min-width: 350px;
            max-width: 350px;
            height: 100vh;
            overflow-y: auto;
            order: -1;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
        }

        .control-panel h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        /* Menu Navigation System */
        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 0;
            padding: 16px;
            flex: 1;
        }

        .menu-item {
            background: var(--bg-primary);
            border: none;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .menu-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .menu-item-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            padding: 14px 16px;
            background: var(--gradient-primary);
            cursor: pointer;
            user-select: none;
            border: none;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item-header:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            letter-spacing: 0.3px;
        }

        .menu-item-header.active {
            background: var(--gradient-accent);
            color: white;
        }

        .menu-item-icon {
            font-size: 18px;
            min-width: 22px;
            display: flex;
            align-items: center;
        }

        .menu-item-header span:nth-child(2) {
            flex: 1;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .menu-item-chevron {
            font-size: 12px;
            transition: transform 0.3s ease;
            min-width: 12px;
            text-align: right;
        }

        .menu-item-header.active .menu-item-chevron {
            transform: rotate(180deg);
        }

        .menu-item-content {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item-content.active {
            max-height: 1000px;
            opacity: 1;
            padding: 16px;
            background: var(--bg-secondary);
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: var(--bg-secondary);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            flex: 1;
            padding: 11px 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .status-message {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border-left: 4px solid transparent;
        }

        .status-message.info {
            background: rgba(226, 238, 254, 0.8);
            color: #2c5aa0;
            border-left-color: #3b82f6;
            display: block;
        }

        .status-message.success {
            background: rgba(220, 252, 231, 0.8);
            color: #22543d;
            border-left-color: #10b981;
            display: block;
        }

        .status-message.error {
            background: rgba(254, 226, 226, 0.8);
            color: #742a2a;
            border-left-color: #ef4444;
            display: block;
        }

        .status-message.warning {
            background: rgba(254, 243, 205, 0.8);
            color: #78350f;
            border-left-color: #f59e0b;
            display: block;
        }

        /* Style selector section */
        .section-divider {
            border-top: 1px solid #e2e8f0;
            margin: 14px 0;
        }

        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: var(--bg-secondary);
        }

        .slider-group {
            margin: 14px 0;
            padding: 12px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 8px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e2e8f0;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
        }

        .slider-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .slider-group input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
        }

        /* Video controls section */
        .video-controls {
            display: none !important;
            padding: 12px 0;
        }

        .video-controls.active {
            display: block !important;
        }

        .btn-record {
            background: var(--gradient-accent);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }

        .btn-record:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.5);
        }

        .btn-success {
            background: var(--gradient-success);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.5);
        }

        .btn-success:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-download {
            background: var(--gradient-info);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
        }

        .btn-download:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .recording-indicator {
            display: none;
            margin-top: 12px;
            padding: 12px 14px;
            background: linear-gradient(135deg, rgba(245, 87, 108, 0.1) 0%, rgba(240, 147, 251, 0.1) 100%);
            color: #f5576c;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            font-size: 13px;
            border-left: 4px solid #f5576c;
            letter-spacing: 0.5px;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animated polyline styles */
        .animated-polyline {
            stroke-dasharray: 10, 5;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -300;
            }
        }

        .animated-icon {
            font-size: 20px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 24px;
        }

        /* Icon animation effects */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes spin-continuous {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* New animation effects */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(0px); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .icon-animation-sway {
            animation-name: sway;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .icon-animation-spin {
            animation-name: spin-continuous;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        .icon-animation-bounce {
            animation-name: bounce;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .icon-animation-pulse {
            animation-name: pulse;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .icon-animation-float {
            animation-name: float;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .icon-animation-wiggle {
            animation-name: wiggle;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        /* Autocomplete suggestions styling */
        .location-input-wrapper {
            position: relative;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1001;
            display: none;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .autocomplete-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            transition: all 0.2s;
            background: white;
        }

        .suggestion-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(240, 147, 251, 0.05) 100%);
            padding-left: 18px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item-main {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 2px;
        }

        .suggestion-item-sub {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 2px;
        }

        .suggestion-loading {
            padding: 12px 14px;
            font-size: 13px;
            color: #a0aec0;
            text-align: center;
        }

        #recording-area-overlay {
            position: fixed;
            top: 0;
            left: 350px;
            width: calc(100% - 350px);
            height: 100%;
            border: 3px dashed rgba(245, 87, 108, 0.7);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            z-index: 999;
            pointer-events: none;
            display: none;
        }

        /* Location marker styles */
        .location-marker-popup {
            font-size: 13px;
            color: #333;
        }

        .location-marker-popup strong {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            color: #2d3748;
        }

        .location-marker-popup small {
            color: #718096;
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .location-marker-popup button {
            padding: 6px 10px;
            font-size: 11px;
            margin-top: 6px;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .location-marker-popup button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }

        /* Place selector modal styles */
        .place-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .place-modal-overlay.active {
            display: flex;
        }

        .place-modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .place-modal h3 {
            margin: 0 0 18px 0;
            color: #2d3748;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .place-icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .place-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 0.1);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 90px;
        }

        .place-icon-item:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .place-icon-item-icon {
            font-size: 36px;
            margin-bottom: 6px;
            transition: all 0.3s ease;
        }

        .place-icon-item:hover .place-icon-item-icon {
            transform: scale(1.1);
            filter: brightness(0);
        }

        .place-icon-item-label {
            font-size: 11px;
            text-align: center;
            color: #4a5568;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .place-icon-item:hover .place-icon-item-label {
            color: white;
        }

        .place-modal-close {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .place-modal-close button {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
            color: #2d3748;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .place-modal-close button:hover {
            background: linear-gradient(135deg, #cbd5e0 0%, #a0aec0 100%);
            transform: translateY(-2px);
        }

        /* Scrollbar styling */
        .control-panel::-webkit-scrollbar {
            width: 6px;
        }

        .control-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--border-color) 0%, var(--text-tertiary) 100%);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .control-panel::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--text-tertiary) 0%, var(--text-secondary) 100%);
        }

        /* Theme Toggle Button */
        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-toggle {
            background: linear-gradient(135deg, var(--border-color) 0%, var(--text-tertiary) 100%);
            color: var(--text-primary);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle.active {
            background: var(--gradient-primary);
            color: white;
        }

        .submenu-popup {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1001;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .submenu-popup.active {
            max-height: 400px;
            opacity: 1;
        }

        .submenu-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #4a5568;
            transition: all 0.2s;
            background: white;
            font-weight: 500;
        }

        .submenu-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(240, 147, 251, 0.08) 100%);
            padding-left: 18px;
            color: #667eea;
        }

        .submenu-item:last-child {
            border-bottom: none;
        }

        /* Quick action buttons */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .quick-actions button {
            flex: 1;
            padding: 9px 10px;
            font-size: 12px;
        }

        /* Version footer */
        #app-version {
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Scrollbar styling */
        .control-panel::-webkit-scrollbar {
            width: 6px;
        }

        .control-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #cbd5e0 0%, #a0aec0 100%);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .control-panel::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #a0aec0 0%, #718096 100%);
        }
    </style>
</head>
<body>
    <div id="map">
        <div id="recording-area-overlay"></div>
    </div>

    <div class="control-panel">
        <!-- Theme Toggle Header -->
        <div class="sidebar-header">
            <button id="darkModeToggle" class="theme-toggle">🌙 Dark</button>
        </div>

        <!-- Category Menu -->
        <nav class="menu-nav" id="categoryMenu">
            <!-- 1. Route Generator -->
            <div class="menu-item">
                <button class="menu-item-header" id="categoryBtn1">
                    <span class="menu-item-icon">🗺️</span>
                    <span>Route Generator</span>
                    <span class="menu-item-chevron">▼</span>
                </button>
                <div class="menu-item-content" id="categoryContent1">
                    <div class="form-group">
                        <label for="startPoint">Titik Awal (Start)</label>
                        <div class="location-input-wrapper">
                            <input
                                type="text"
                                id="startPoint"
                                placeholder="e.g., -6.2088,106.8456 atau ketik nama kota"
                                autocomplete="off"
                            >
                            <div class="autocomplete-suggestions" id="startSuggestions"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="endPoint">Titik Tujuan (Destination)</label>
                        <div class="location-input-wrapper">
                            <input
                                type="text"
                                id="endPoint"
                                placeholder="e.g., -6.1751,106.8291 atau ketik nama kota"
                                autocomplete="off"
                            >
                            <div class="autocomplete-suggestions" id="endSuggestions"></div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn-primary" id="generateBtn">Generate Route</button>
                        <button class="btn-secondary" id="clearBtn">Clear</button>
                    </div>

                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>

            <!-- 2. Map and Icon -->
            <div class="menu-item">
                <button class="menu-item-header" id="categoryBtn2">
                    <span class="menu-item-icon">🎨</span>
                    <span>Map and Icon</span>
                    <span class="menu-item-chevron">▼</span>
                </button>
                <div class="menu-item-content" id="categoryContent2">
                    <div class="form-group">
                        <label for="styleSelector">Map Style</label>
                        <select id="styleSelector">
                            <option value="cartodb-positron">CartoDB Positron (Default)</option>
                            <option value="cartodb-voyager">CartoDB Voyager</option>
                            <option value="osm">OpenStreetMap</option>
                            <option value="satellite">Satellite</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="iconSelector">Icon untuk Animasi</label>
                        <select id="iconSelector">
                            <option value="🚗">🚗 Mobil Merah</option>
                            <option value="🚕">🚕 Taxi Kuning</option>
                            <option value="🚙">🚙 SUV</option>
                            <option value="🚌">🚌 Bus</option>
                            <option value="🚎">🚎 Bus Hijau</option>
                            <option value="🚐">🚐 Minibus</option>
                            <option value="🚚">🚚 Truk</option>
                            <option value="🚛">🚛 Truk Besar</option>
                            <option value="🚜">🚜 Traktor</option>
                            <option value="🏎️">🏎️ Race Car</option>
                            <option value="🚓">🚓 Polisi</option>
                            <option value="🚑">🚑 Ambulans</option>
                            <option value="🚒">🚒 Fire Truck</option>
                            <option value="🛵">🛵 Motor</option>
                            <option value="🏍️">🏍️ Motorcycle</option>
                            <option value="🚲">🚲 Sepeda</option>
                            <option value="🛴">🛴 Skateboard</option>
                            <option value="✈️">✈️ Pesawat</option>
                            <option value="🚁">🚁 Helikopter</option>
                            <option value="🛸">🛸 UFO</option>
                            <option value="🚀">🚀 Rocket</option>
                            <option value="⛵">⛵ Perahu</option>
                            <option value="🛥️">🛥️ Speedboat</option>
                            <option value="🚢">🚢 Kapal</option>
                            <option value="🐎">🐎 Kuda</option>
                            <option value="🐘">🐘 Gajah</option>
                            <option value="🦁">🦁 Singa</option>
                            <option value="🐓">🐓 Ayam</option>
                            <option value="👤">👤 Manusia</option>
                            <option value="🤖">🤖 Robot</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="customIconUpload">Unggah Ikon Kustom (PNG/JPG):</label>
                        <input type="file" id="customIconUpload" accept="image/png, image/jpeg">
                        <img id="customIconPreview" src="" alt="Custom Icon Preview" style="display: none; max-width: 24px; max-height: 24px; margin-top: 5px;">
                    </div>

                    <div class="slider-group">
                        <label for="iconSizeSlider">
                            Ukuran Ikon
                            <span id="iconSizeValue">20px</span>
                        </label>
                        <input
                            type="range"
                            id="iconSizeSlider"
                            min="16"
                            max="200"
                            step="1"
                            value="20"
                        >
                    </div>

                    <div class="slider-group">
                        <label for="iconRotationSlider">
                            Rotasi Ikon
                            <span id="iconRotationValue">90°</span>
                        </label>
                        <input
                            type="range"
                            id="iconRotationSlider"
                            min="0"
                            max="360"
                            step="1"
                            value="90"
                        >
                    </div>

                    <div class="form-group">
                        <label for="iconAnimationEffect">Efek Animasi Ikon</label>
                        <select id="iconAnimationEffect" class="styled-select">
                            <option value="none">Tidak Ada</option>
                            <option value="sway">🌊 Goyang</option>
                            <option value="spin">🔄 Berputar</option>
                            <option value="bounce">⬆️ Lompat</option>
                            <option value="pulse">💓 Denyut</option>
                            <option value="float">☁️ Melayang</option>
                            <option value="wiggle">↔️ Goyang Lebar</option>
                        </select>
                    </div>

                    <div class="slider-group">
                        <label for="iconAnimationSpeedSlider">
                            Kecepatan Animasi Ikon
                            <span id="iconAnimationSpeedValue">1.0s</span>
                        </label>
                        <input
                            type="range"
                            id="iconAnimationSpeedSlider"
                            min="0.5"
                            max="3"
                            step="0.1"
                            value="1"
                        >
                    </div>

                    <div class="slider-group">
                        <label for="speedSlider">
                            Animation Speed
                            <span id="speedValue">1.0x</span>
                        </label>
                        <input
                            type="range"
                            id="speedSlider"
                            min="0.1"
                            max="3"
                            step="0.1"
                            value="1"
                        >
                    </div>
                </div>
            </div>

            <!-- 3. Custom Location -->
            <div class="menu-item">
                <button class="menu-item-header" id="categoryBtn3">
                    <span class="menu-item-icon">📍</span>
                    <span>Custom Location</span>
                    <span class="menu-item-chevron">▼</span>
                </button>
                <div class="menu-item-content" id="categoryContent3">
                    <div class="button-group">
                        <button class="btn-primary" id="addPlaceBtn" style="width: 100%;">+ Tambah Tempat</button>
                    </div>
                    <button class="btn-secondary" id="clearPlacesBtn" style="width: 100%; margin-top: 8px;">Hapus Semua Tempat</button>
                    <div id="placeStatusMessage" class="status-message"></div>

                    <div style="padding: 10px; background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(240, 147, 251, 0.08) 100%); border-radius: 8px; font-size: 12px; color: #4a5568; margin-top: 12px; border-left: 4px solid #667eea; font-weight: 500;">
                        💡 Klik tombol di atas, lalu klik pada peta untuk menambahkan tempat. Marker dapat digeser.
                    </div>
                </div>
            </div>

            <!-- 4. Opsi Rekaman -->
            <div class="menu-item">
                <button class="menu-item-header" id="categoryBtn4">
                    <span class="menu-item-icon">🎬</span>
                    <span>Opsi Rekaman</span>
                    <span class="menu-item-chevron">▼</span>
                </button>
                <div class="menu-item-content" id="categoryContent4">
                    <div class="form-group">
                        <label for="recordingQuality">Bitrate Video</label>
                        <select id="recordingQuality" class="styled-select">
                            <option value="20000000">20 Mbps</option>
                            <option value="25000000">25 Mbps</option>
                            <option value="30000000" selected>30 Mbps</option>
                            <option value="35000000">35 Mbps</option>
                            <option value="40000000">40 Mbps</option>
                            <option value="45000000">45 Mbps</option>
                            <option value="50000000">50 Mbps</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="recordingFps">Frame Rate:</label>
                        <select id="recordingFps" class="styled-select">
                            <option value="15">15 FPS</option>
                            <option value="30" selected>30 FPS</option>
                            <option value="60">60 FPS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="recordingAspectRatio">Aspek Rasio:</label>
                        <select id="recordingAspectRatio" class="styled-select">
                            <option value="auto" selected>Otomatis (Ukuran Layar)</option>
                            <option value="16:9">16:9 (HD Video)</option>
                            <option value="1:1">1:1 (Persegi)</option>
                        </select>
                    </div>

                    <div id="videoControls" style="display: none;">
                        <div class="button-group">
                            <button id="animateBtn">Mulai Animasi</button>
                        </div>
                        <div class="button-group">
                            <button class="btn-record" id="recordBtn">Record Animation</button>
                        </div>
                        <div class="button-group">
                            <button class="btn-download" id="downloadBtn" disabled>Export Video</button>
                        </div>
                        <div class="recording-indicator" id="recordingIndicator">
                            ● Recording...
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Version Number -->
        <div style="border-top: 2px solid #e2e8f0; margin-top: auto; padding: 16px;">
            <div id="app-version" style="text-align: center; font-size: 12px; color: #a0aec0;"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- Leaflet AntPath (working CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.1.2/dist/leaflet-ant-path.umd.min.js"></script>

    <!-- Main Application Script (with cache busting) -->
    <script src="app.js?v=20260415_v12"></script>

    <!-- Place Selector Modal -->
    <div id="placeModal" class="place-modal-overlay">
        <div class="place-modal">
            <div class="place-modal-close">
                <h3>Pilih Jenis Tempat</h3>
                <button id="closeModalBtn">Tutup</button>
            </div>
            <div class="place-icons-grid" id="placeIconsGrid"></div>
        </div>
    </div>
</body>
</html>
